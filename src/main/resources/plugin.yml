name: LabyMutePlugin
version: 2.3
main: me.pacotaco.laby.LabyMutePlugin
api-version: '1.21'
description: A MySQL-backed LabyMod mute and history system with Discord webhook logging.
author: PacoTaco

depend: [LabyModServerAPI]

commands:
  labymute:
    description: Mute a player's LabyMod features.
    usage: /labymute <player> <time> <reason>
    permission: labymute.use
  labyunmute:
    description: Remove a LabyMod mute.
    usage: /labyunmute <player>
    permission: labymute.use
  labyhist:
    description: View mute history.
    usage: /labyhist <player> [page]
    permission: labymute.use
  labyprune:
    description: Delete a specific mute entry from the database.
    usage: /labyprune <player> <id>
    permission: labymute.admin
  labyreload:
    description: Reload the LabyMutePlugin configuration.
    usage: /labyreload
    permission: labymute.admin

permissions:
  labymute.use:
    description: Allows use of standard mute, unmute, and history commands.
    default: op
  labymute.admin:
    description: Allows reloading the plugin and pruning database entries.
    default: op
